<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — JStudyC</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="icon" href="assets/logo.png">
  <script src="theme.js"></script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
  <canvas id="particle-canvas"></canvas>

  <!-- Navbar -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">
        <img src="assets/logo.png" alt="Logo" class="logo-img">
        <div class="logo-text">JStudy<span>C</span></div>
      </a>
      <div class="navbar-links" id="navLinks">
        <a href="#" class="nav-active">Dashboard</a>
        <button class="btn-theme-toggle" id="themeToggle" aria-label="Toggle theme">☀️</button>
        <button class="btn-login" id="btnLogout">Logout</button>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Dashboard Content -->
  <main class="dashboard">
    <div class="container">

      <!-- Welcome Header -->
      <div class="dash-header reveal">
        <div>
          <h1 class="dash-title">Dashboard</h1>
          <p class="dash-subtitle">Selamat datang kembali, <span id="userName">User</span></p>
        </div>
      </div>

      <!-- Overall Progress -->
      <div class="overall-progress reveal">
        <div class="progress-card">
          <div class="progress-icon">📊</div>
          <div class="progress-info">
            <span class="progress-value" id="totalAnswered">0</span>
            <span class="progress-label">Soal Dijawab</span>
          </div>
        </div>
        <div class="progress-card">
          <div class="progress-icon">✅</div>
          <div class="progress-info">
            <span class="progress-value" id="totalCorrect">0%</span>
            <span class="progress-label">Akurasi</span>
          </div>
        </div>
        <div class="progress-card">
          <div class="progress-icon">🔥</div>
          <div class="progress-info">
            <span class="progress-value" id="totalPakets">0/18</span>
            <span class="progress-label">Paket Selesai</span>
          </div>
        </div>
      </div>

      <!-- Block Cards -->
      <section class="blocks-section">
        <h2 class="section-title reveal">Pilih Blok</h2>

        <div class="block-card reveal" id="block-ii-3">
          <div class="block-header">
            <div class="block-badge">Blok II.3</div>
            <div class="block-progress-ring" id="blockProgress"></div>
          </div>
          <h3 class="block-name">Seizure, Unconsciousness, and Sense Organ Problem</h3>
          <p class="block-desc">Paket soal ujian untuk blok II.3 — meliputi kejang, penurunan kesadaran, dan gangguan organ sensorik.</p>

          <!-- Exam Tabs -->
          <div class="exam-tabs">
            <button class="exam-tab active" data-exam="cumex-1">Cumex 1</button>
            <button class="exam-tab" data-exam="cumex-2">Cumex 2</button>
            <button class="exam-tab" data-exam="uas">UAS</button>
          </div>

          <!-- Exam Content -->
          <div class="exam-content" id="examContent">
            <!-- Dynamically populated -->
          </div>
        </div>
      </section>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="data/questions.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
